<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для моей любимой</title>
    <style>
        :root {
            --color1: #ffafbd;
            --color2: #ffc3a0;
            --color3: #ee9ca7;
            --color4: #ffdde1;
            --accent: #d63031;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Анимированный фон */
        .bg-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(-45deg, var(--color1), var(--color2), var(--color3), var(--color4));
            background-size: 400% 400%;
            animation: gradientMove 10s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glow {
            position: absolute;
            width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(255,255,255,0.2) 80%);
            pointer-events: none;
        }

        .particle {
            position: absolute;
            top: -50px;
            pointer-events: none;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        /* Взрыв сердечек */
        .burst-heart {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            animation: heartBurst 1.2s ease-out forwards;
            opacity: 0;
        }

        @keyframes heartBurst {
            0% { transform: translate(-50%, -50%) scale(0.3); opacity: 1; }
            100% { 
                transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.5); 
                opacity: 0; 
            }
        }

        /* Экраны */
        .screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
            position: absolute;
            transition: all 0.8s ease;
        }

        #envelope-screen { cursor: pointer; z-index: 10; }

        .envelope {
            width: 260px; height: 160px;
            background: #ff7675;
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border-radius: 0 0 5px 5px;
        }

        .envelope::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            border-left: 130px solid transparent;
            border-right: 130px solid transparent;
            border-top: 90px solid #ff5252;
            transform-origin: top;
            transition: transform 0.6s;
            z-index: 2;
        }

        .envelope.open::after { transform: rotateX(180deg); }

        #main-screen {
            opacity: 0;
            visibility: hidden;
            flex-direction: column;
            text-align: center;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            max-width: 90%;
            width: 400px;
            max-height: 85vh;
            overflow-y: auto;
            scrollbar-width: none;
        }
        
        .glass-card::-webkit-scrollbar { display: none; }

        .photo-frame {
            width: 220px; height: 280px;
            object-fit: cover;
            border: 6px solid white;
            border-bottom: 40px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            margin-bottom: 20px;
            opacity: 0;
            transform: scale(0.8) rotate(-5deg);
            cursor: pointer;
        }

        .photo-active { animation: photoIn 0.8s forwards ease-out; }

        @keyframes photoIn { to { opacity: 1; transform: scale(1) rotate(-2deg); } }

        .wish-text {
            font-size: 1.2rem;
            color: #444;
            min-height: 3em;
            margin: 15px 0;
            font-style: italic;
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(214, 48, 49, 0.3);
        }

        .collage {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 15px;
        }

        .collage img {
            width: 100%; height: 100px;
            object-fit: cover;
            border-radius: 5px;
            border: 2px solid white;
        }
    </style>
</head>
<body>

    <div class="bg-container"></div>
    <div class="glow"></div>
    <div id="particles"></div>

    <div id="envelope-screen" class="screen" onclick="openMe()">
        <div class="envelope" id="env">
            <div style="position:absolute; bottom:20px; width:100%; text-align:center; color:white; font-size:12px;">Тебе письмо ❤️</div>
        </div>
    </div>

    <div id="main-screen" class="screen">
        <div class="glass-card">
            <h2 style="color:var(--accent); margin-top:0;">Добрый вечер, любимая</h2>
            <div id="content-box">
                <img src="your_photo1.jpg" id="main-photo" class="photo-frame" onclick="createHeartBurst(event)">
                <div id="text-box" class="wish-text"></div>
                <button class="btn" id="btn" onclick="nextSlide()" style="display:none;">Нажми дальше ✨</button>
            </div>
        </div>
    </div>

    <script>
        const wishes = [
            "Жаным❤️...",
            "Ты сияешь ярче любых звезд.",
            "Каждая минута с тобой — это счастье.",
            "Хочу, чтобы ты всегда улыбалась!",
            "Твоя улыбка — мой любимый вид искусства."
        ];

        const photos = ["your_photo2.jpg", "your_photo3.jpg", "your_photo4.jpg"];
        let step = 0;

        // Взрыв сердечек при клике
        function createHeartBurst(e) {
            const x = e.clientX;
            const y = e.clientY;
            const symbols = ['❤️', '💖', '🤍'];
            for (let i = 0; i < 15; i++) {
                const heart = document.createElement('span');
                heart.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                heart.className = 'burst-heart';
                const dx = (Math.random() - 0.5) * 200 + 'px';
                const dy = (Math.random() - 0.5) * 200 + 'px';
                heart.style.setProperty('--dx', dx);
                heart.style.setProperty('--dy', dy);
                heart.style.left = x + 'px';
                heart.style.top = y + 'px';
                heart.style.fontSize = Math.random() * 10 + 15 + 'px';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 1200);
            }
        }

        // Падающие фоновые частицы
        function createParticles() {
            const container = document.getElementById('particles');
            const items = ['🌸', '❤️', '💖', '✨'];
            setInterval(() => {
                const p = document.createElement('div');
                p.className = 'particle';
                p.innerHTML = items[Math.floor(Math.random()*items.length)];
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = (Math.random() * 3 + 4) + 's';
                p.style.opacity = Math.random();
                container.appendChild(p);
                setTimeout(() => p.remove(), 7000);
            }, 400);
        }
        createParticles();

        // Эффект печатающегося текста
        function type(txt, i = 0) {
            const box = document.getElementById('text-box');
            const btn = document.getElementById('btn');
            if (i === 0) { box.innerHTML = ''; btn.style.display = 'none'; }
            if (i < txt.length) {
                box.innerHTML += txt.charAt(i);
                setTimeout(() => type(txt, i + 1), 60);
            } else {
                btn.style.display = 'inline-block';
            }
        }

        // Логика открытия конверта
        function openMe() {
            document.getElementById('env').classList.add('open');
            setTimeout(() => {
                document.getElementById('envelope-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('envelope-screen').style.display = 'none';
                    const main = document.getElementById('main-screen');
                    main.style.visibility = 'visible';
                    main.style.opacity = '1';
                    showStep(0);
                }, 800);
            }, 600);
        }

        function showStep(n) {
            const img = document.getElementById('main-photo');
            img.classList.remove('photo-active');
            if (n > 0 && n <= photos.length) img.src = photos[n-1];
            setTimeout(() => {
                img.classList.add('photo-active');
                type(wishes[n] || "Люблю тебя!");
            }, 100);
        }

        function nextSlide() {
            step++;
            if (step <= photos.length) showStep(step);
            else showCollage();
        }

        function showCollage() {
            const box = document.getElementById('content-box');
            box.style.opacity = '0';
            setTimeout(() => {
                box.innerHTML = `
                    <div class="collage">
                        <img src="collage1.jpg"> <img src="collage2.jpg"> <img src="collage3.jpg">
                        <img src="collage4.jpg"> <img src="collage5.jpg"> <img src="collage6.jpg">
                    </div>
                    <p style="color:var(--accent); font-weight:bold; margin-top:15px; font-size: 1.1rem;">
                        Дальше — больше. Только вдвоём. ❤️
                    </p>
                    <p style="color: #666; font-size: 0.9rem; font-style: italic; margin-top: 0;">
                       И это только начало нашей истории...
                    </p>
                    <button class="btn" onclick="restart()" style="margin-top: 15px; background: rgba(255,255,255,0.5); color: #444; font-size: 0.8rem; padding: 8px 15px;">
                       Посмотреть ещё раз ✨
                    </button>
                `;
                box.style.opacity = '1';
                document.querySelector('.glass-card').scrollTop = 0;
            }, 500);
        }

        function restart() {
            step = 0;
            document.getElementById('main-screen').style.opacity = '0';
            document.getElementById('main-screen').style.visibility = 'hidden';
            const envScreen = document.getElementById('envelope-screen');
            envScreen.style.display = 'flex';
            setTimeout(() => {
                envScreen.style.opacity = '1';
                document.getElementById('env').classList.remove('open');
            }, 50);

            document.getElementById('content-box').innerHTML = `
                <img src="your_photo1.jpg" id="main-photo" class="photo-frame" onclick="createHeartBurst(event)">
                <div id="text-box" class="wish-text"></div>
                <button class="btn" id="btn" onclick="nextSlide()" style="display:none;">Нажми дальше ✨</button>
            `;
        }
    </script>
</body>
</html>
